<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mosaic</title>
    <script>
      // GitHub Pages SPA redirect.
      // Encodes the full URL into a query param and redirects to the root,
      // where index.html will decode it and push the correct route.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.split('/').slice(2).join('/') + (l.search ? l.search : '')) +
        (l.hash ? l.hash : '')
      );
    </script>
  </head>
  <body></body>
</html>
